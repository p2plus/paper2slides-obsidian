<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="28" fill="#F6F1E8"/>
  <rect x="40" y="40" width="1200" height="640" rx="24" fill="#FFFDF8" stroke="#D8CCB8" stroke-width="2"/>

  <text x="88" y="118" fill="#2E2A26" font-family="Avenir, Inter, sans-serif" font-size="40" font-weight="700">Paper2Slides Obsidian Flow</text>
  <text x="88" y="156" fill="#6E6254" font-family="Avenir, Inter, sans-serif" font-size="22">Was im Plugin tatsächlich passiert, wenn du aus einer PDF oder Markdown-Datei Slides erzeugst.</text>

  <rect x="88" y="212" width="208" height="118" rx="22" fill="#FFF3D9" stroke="#D9B46B" stroke-width="2"/>
  <text x="114" y="257" fill="#5A4722" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">1. Obsidian file</text>
  <text x="114" y="292" fill="#7A6540" font-family="Avenir, Inter, sans-serif" font-size="20">PDF = paper mode</text>
  <text x="114" y="320" fill="#7A6540" font-family="Avenir, Inter, sans-serif" font-size="20">MD = general mode</text>

  <rect x="346" y="212" width="220" height="118" rx="22" fill="#E8F4EC" stroke="#7FB08A" stroke-width="2"/>
  <text x="372" y="257" fill="#224731" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">2. Plugin shell-out</text>
  <text x="372" y="292" fill="#476555" font-family="Avenir, Inter, sans-serif" font-size="20">Runs</text>
  <text x="372" y="320" fill="#476555" font-family="IBM Plex Mono, Menlo, monospace" font-size="20">python3 -m paper2slides</text>

  <rect x="620" y="190" width="538" height="336" rx="28" fill="#EEF3FF" stroke="#9DB2E6" stroke-width="2"/>
  <text x="652" y="236" fill="#243B6B" font-family="Avenir, Inter, sans-serif" font-size="28" font-weight="700">3. Paper2Slides pipeline</text>

  <rect x="652" y="272" width="215" height="86" rx="18" fill="#FFFFFF" stroke="#B9C8ED" stroke-width="2"/>
  <text x="680" y="307" fill="#2D4679" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">RAG</text>
  <text x="680" y="337" fill="#5D6F95" font-family="Avenir, Inter, sans-serif" font-size="18">parse, index, retrieve</text>

  <rect x="903" y="272" width="223" height="86" rx="18" fill="#FFFFFF" stroke="#B9C8ED" stroke-width="2"/>
  <text x="931" y="307" fill="#2D4679" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">Summary</text>
  <text x="931" y="337" fill="#5D6F95" font-family="Avenir, Inter, sans-serif" font-size="18">structure + key content</text>

  <rect x="652" y="388" width="215" height="86" rx="18" fill="#FFFFFF" stroke="#B9C8ED" stroke-width="2"/>
  <text x="680" y="423" fill="#2D4679" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">Plan</text>
  <text x="680" y="453" fill="#5D6F95" font-family="Avenir, Inter, sans-serif" font-size="18">layout + narrative arc</text>

  <rect x="903" y="388" width="223" height="86" rx="18" fill="#FFFFFF" stroke="#B9C8ED" stroke-width="2"/>
  <text x="931" y="423" fill="#2D4679" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">Generate</text>
  <text x="931" y="453" fill="#5D6F95" font-family="Avenir, Inter, sans-serif" font-size="18">slides, poster, assets</text>

  <rect x="88" y="404" width="478" height="122" rx="22" fill="#F4EAFE" stroke="#B89DDD" stroke-width="2"/>
  <text x="116" y="448" fill="#4B2E72" font-family="Avenir, Inter, sans-serif" font-size="24" font-weight="700">4. Import back into the vault</text>
  <text x="116" y="484" fill="#6F5893" font-family="Avenir, Inter, sans-serif" font-size="20">The plugin grabs the newest outputs and drops them into</text>
  <text x="116" y="514" fill="#6F5893" font-family="IBM Plex Mono, Menlo, monospace" font-size="20">Paper2Slides/&lt;source-file-name&gt;/</text>

